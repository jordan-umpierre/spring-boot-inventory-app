<!DOCTYPE html>
<html lang="en" xmlns:th="https://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Outsourced Part Detail</title>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
</head>
<body>
<h1>Outsourced Part Detail</h1>

<form action="#" th:action="@{/showFormAddOutPart}" th:object="${outsourcedpart}" method="POST">

<!-- Add hidden form field to handle update -->
    <p><input type="hidden" th:field="*{id}"/></p>

    <p>
        <input type="text" th:field="*{name}" placeholder="Name" class="form-control mb-4 col-4"/>
        <span th:if="${#fields.hasErrors('name')}" th:errors="*{name}" class="text-danger"></span>
    </p>

    <p>
        <input type="text" th:field="*{price}" placeholder="Price" class="form-control mb-4 col-4"/>
        <span th:if="${#fields.hasErrors('price')}" th:errors="*{price}" class="text-danger"></span>
    </p>

    <p>
        <input type="text" th:field="*{inv}" placeholder="Inventory" class="form-control mb-4 col-4"/>
        <span th:if="${#fields.hasErrors('inv')}" th:errors="*{inv}" class="text-danger"></span>
    </p>

    <p>
        <input type="text" th:field="*{min}" placeholder="Minimum" class="form-control mb-4 col-4"/>
        <span th:if="${#fields.hasErrors('min')}" th:errors="*{min}" class="text-danger"></span>
    </p>

    <p>
        <input type="text" th:field="*{max}" placeholder="Maximum" class="form-control mb-4 col-4"/>
        <span th:if="${#fields.hasErrors('max')}" th:errors="*{max}" class="text-danger"></span>
    </p>
    <!-- Show business-rule error (inv/min/max) -->
    <div th:if="${formError}" class="alert alert-danger mb-3" th:text="${formError}"></div>

    <p><input type="text" th:field="*{companyName}" placeholder="Company Name" class="form-control mb-4 col-4"/></p>

<p><input type="submit" value="Submit" /></p>
</form>
<a th:href="@{/}">Back to Main Screen</a>
</body>
</html>
